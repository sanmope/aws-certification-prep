<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Notes — AWS Prep</title>
  <script src="content.js"></script>
  <style>
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --surface2: #21262d;
      --border:   #30363d;
      --text:     #e6edf3;
      --text2:    #8b949e;
      --blue:     #58a6ff;
      --green:    #3fb950;
      --yellow:   #d29922;
      --red:      #f85149;
      --purple:   #bc8cff;
      --radius:   8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    header .title { font-size: 16px; font-weight: 600; }
    header a { color: var(--text2); font-size: 12px; text-decoration: none; }
    header a:hover { color: var(--blue); }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    aside {
      width: 240px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px 0;
    }
    .nav-cert {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text2);
      padding: 4px 16px 8px;
    }
    .nav-domain {
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      padding: 6px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }
    .nav-domain:hover { color: var(--text); }
    .nav-domain .chevron { font-size: 10px; transition: transform 0.15s; }
    .nav-domain.open .chevron { transform: rotate(90deg); }
    .nav-subtopics { display: none; }
    .nav-domain.open + .nav-subtopics { display: block; }
    .nav-subtopic {
      font-size: 12px;
      padding: 5px 16px 5px 28px;
      cursor: pointer;
      color: var(--text2);
      border-left: 2px solid transparent;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .nav-subtopic:hover { color: var(--text); background: var(--surface2); }
    .nav-subtopic.active { color: var(--blue); border-left-color: var(--blue); background: rgba(88,166,255,0.06); }
    .nav-subtopic .dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
      background: var(--border);
    }
    .nav-subtopic.has-content .dot { background: var(--blue); }

    /* ── Main ── */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 32px 40px;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: var(--text2);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h2 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 13px; }

    /* ── Content sections ── */
    .note-header { margin-bottom: 32px; }
    .note-title { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .note-meta { color: var(--text2); font-size: 12px; }

    .section { margin-bottom: 32px; }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text2);
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    /* analogy */
    .analogy-box {
      background: rgba(88,166,255,0.07);
      border: 1px solid rgba(88,166,255,0.2);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 13px;
      line-height: 1.6;
    }

    /* concepts */
    .concept { margin-bottom: 20px; }
    .concept-term {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
      margin-bottom: 4px;
    }
    .concept-body { color: var(--text2); font-size: 13px; margin-bottom: 8px; }
    pre {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 12px;
      line-height: 1.5;
      overflow-x: auto;
      color: var(--text);
      white-space: pre;
    }

    /* conditions table */
    .cond-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .cond-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); }
    .cond-table tr:last-child td { border-bottom: none; }
    .cond-table td:first-child {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      color: var(--purple);
      white-space: nowrap;
    }
    .cond-table td:last-child { color: var(--text2); }

    /* exam tips */
    .tip-list { list-style: none; }
    .tip-list li {
      padding: 6px 0 6px 18px;
      border-bottom: 1px solid var(--border);
      color: var(--text2);
      font-size: 13px;
      position: relative;
    }
    .tip-list li:last-child { border-bottom: none; }
    .tip-list li::before { content: "→"; position: absolute; left: 0; color: var(--blue); }

    /* anti-patterns */
    .anti-list { list-style: none; }
    .anti-list li {
      padding: 5px 0;
      font-size: 13px;
      color: var(--text2);
    }

    /* lab */
    .lab-box {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .lab-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: var(--surface2);
      font-size: 12px;
    }
    .lab-objective { padding: 12px 14px; color: var(--text2); font-size: 13px; border-bottom: 1px solid var(--border); }
    .lab-output {
      background: #0d1117;
      padding: 12px 14px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 12px;
      color: var(--green);
      border-bottom: 1px solid var(--border);
      white-space: pre;
    }
    .lab-learnings { list-style: none; padding: 10px 14px; }
    .lab-learnings li {
      font-size: 12px;
      color: var(--text2);
      padding: 4px 0 4px 14px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .lab-learnings li:last-child { border-bottom: none; }
    .lab-learnings li::before { content: "→"; position: absolute; left: 0; color: var(--yellow); }

    /* linux map */
    .map-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .map-table th {
      text-align: left;
      padding: 6px 10px;
      color: var(--text2);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .5px;
      border-bottom: 1px solid var(--border);
    }
    .map-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); }
    .map-table tr:last-child td { border-bottom: none; }
    .map-table td:first-child { font-family: monospace; font-size: 12px; color: var(--green); }
    .map-table td:last-child { color: var(--blue); }
  </style>
</head>
<body>

<header>
  <div class="title">Study Notes — SAA-C03</div>
  <a href="index.html">← Dashboard</a>
</header>

<div class="layout">
  <aside id="sidebar"></aside>
  <main id="main">
    <div class="empty-state">
      <div class="icon">◈</div>
      <h2>Seleccioná un subtopic</h2>
      <p>Los subtopics con punto azul tienen contenido. Los grises todavía no fueron estudiados.</p>
    </div>
  </main>
</div>

<script>
const data = window.CONTENT_DATA;

// ── Sidebar ──────────────────────────────────────────────────────────────────

function buildSidebar() {
  const aside = document.getElementById('sidebar');
  data.certs.forEach(cert => {
    const certLabel = document.createElement('div');
    certLabel.className = 'nav-cert';
    certLabel.textContent = cert.name;
    aside.appendChild(certLabel);

    cert.domains.forEach(domain => {
      const domainEl = document.createElement('div');
      domainEl.className = 'nav-domain';
      domainEl.innerHTML = `<span>${domain.name}</span><span class="chevron">▶</span>`;
      domainEl.addEventListener('click', () => domainEl.classList.toggle('open'));
      aside.appendChild(domainEl);

      const subtopicsEl = document.createElement('div');
      subtopicsEl.className = 'nav-subtopics';
      domain.subtopics.forEach(sub => {
        const subEl = document.createElement('div');
        const hasContent = sub.sections && sub.sections.length > 0;
        subEl.className = `nav-subtopic${hasContent ? ' has-content' : ''}`;
        subEl.dataset.cert = cert.id;
        subEl.dataset.domain = domain.id;
        subEl.dataset.sub = sub.id;
        subEl.innerHTML = `<span class="dot"></span><span>${sub.name}</span>`;
        subEl.addEventListener('click', () => loadSubtopic(cert, domain, sub, subEl));
        subtopicsEl.appendChild(subEl);
      });
      aside.appendChild(subtopicsEl);

      // Auto-open domain that has studied content
      const hasStudied = domain.subtopics.some(s => s.lastStudied);
      if (hasStudied) domainEl.classList.add('open');
    });
  });
}

// ── Content renderer ─────────────────────────────────────────────────────────

function loadSubtopic(cert, domain, sub, navEl) {
  document.querySelectorAll('.nav-subtopic').forEach(el => el.classList.remove('active'));
  navEl.classList.add('active');

  const main = document.getElementById('main');

  if (!sub.sections || sub.sections.length === 0) {
    main.innerHTML = `
      <div class="empty-state">
        <div class="icon">◇</div>
        <h2>${sub.name}</h2>
        <p>Todavía no estudiamos este tema.<br>Usá <code>/prof ${sub.name}</code> para arrancar.</p>
      </div>`;
    return;
  }

  const date = sub.lastStudied
    ? `Última sesión: ${sub.lastStudied}`
    : 'Sin fecha registrada';

  let html = `
    <div class="note-header">
      <div class="note-title">${sub.fullName}</div>
      <div class="note-meta">${domain.name} · ${cert.name} · ${date}</div>
    </div>`;

  sub.sections.forEach(sec => {
    html += renderSection(sec);
  });

  main.innerHTML = html;
}

function renderSection(sec) {
  switch (sec.type) {

    case 'analogy':
      return `<div class="section">
        <div class="section-title">${sec.title}</div>
        <div class="analogy-box">${sec.content}</div>
      </div>`;

    case 'concepts': {
      const concepts = sec.items.map(item => `
        <div class="concept">
          <div class="concept-term">${item.term}</div>
          <div class="concept-body">${item.body}</div>
          ${item.code ? `<pre>${escHtml(item.code)}</pre>` : ''}
        </div>`).join('');
      return `<div class="section">
        <div class="section-title">${sec.title}</div>
        ${concepts}
      </div>`;
    }

    case 'conditions': {
      const rows = sec.items.map(i =>
        `<tr><td>${escHtml(i.key)}</td><td>${escHtml(i.use)}</td></tr>`
      ).join('');
      return `<div class="section">
        <div class="section-title">${sec.title}</div>
        <table class="cond-table"><tbody>${rows}</tbody></table>
      </div>`;
    }

    case 'exam': {
      const tips = sec.items.map(i => `<li>${i}</li>`).join('');
      return `<div class="section">
        <div class="section-title">${sec.title}</div>
        <ul class="tip-list">${tips}</ul>
      </div>`;
    }

    case 'antipatterns': {
      const anti = sec.items.map(i => `<li>${i}</li>`).join('');
      return `<div class="section">
        <div class="section-title">${sec.title}</div>
        <ul class="anti-list">${anti}</ul>
      </div>`;
    }

    case 'linux-map': {
      const mapRows = sec.items.map(i =>
        `<tr><td>${escHtml(i.linux)}</td><td>${escHtml(i.aws)}</td></tr>`
      ).join('');
      return `<div class="section">
        <div class="section-title">${sec.title}</div>
        <table class="map-table">
          <thead><tr><th>Linux</th><th>AWS IAM</th></tr></thead>
          <tbody>${mapRows}</tbody>
        </table>
      </div>`;
    }

    case 'lab': {
      const badge = sec.result === 'pass'
        ? '<span style="color:#3fb950;font-weight:700">✓ PASS</span>'
        : '<span style="color:#f85149;font-weight:700">✗ FAIL</span>';
      const learnings = sec.learnings.map(l => `<li>${l}</li>`).join('');
      return `<div class="section">
        <div class="section-title">${sec.title}</div>
        <div class="lab-box">
          <div class="lab-header">
            <span style="color:var(--text2)">${sec.date}</span>
            ${badge}
          </div>
          <div class="lab-objective">${sec.objective}</div>
          <div class="lab-output">${escHtml(sec.output)}</div>
          <ul class="lab-learnings">${learnings}</ul>
        </div>
      </div>`;
    }

    default:
      return '';
  }
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Init ─────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  buildSidebar();

  // Auto-load first subtopic that has content
  for (const cert of data.certs) {
    for (const domain of cert.domains) {
      for (const sub of domain.subtopics) {
        if (sub.sections && sub.sections.length > 0) {
          const navEl = document.querySelector(`[data-sub="${sub.id}"]`);
          if (navEl) { loadSubtopic(cert, domain, sub, navEl); return; }
        }
      }
    }
  }
});
</script>
</body>
</html>
